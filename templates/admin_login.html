<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{ s.store_name }} — دخول الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;min-height:100vh;background:linear-gradient(145deg,#1a1118 0%,#2d1f2a 50%,#1a1118 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{width:100%;max-width:420px}
.login-header{text-align:center;margin-bottom:40px}
.login-logo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #c9848a;box-shadow:0 8px 30px rgba(201,132,138,0.3);margin:0 auto 20px;display:block}
.login-logo-placeholder{font-size:3rem;margin-bottom:16px}
.login-store-name{font-size:1.6rem;font-weight:700;color:#e8ddd6;letter-spacing:3px;margin-bottom:6px}
.login-subtitle{color:#a89288;font-size:0.85rem;letter-spacing:1px}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,#c9848a44)}
.divider-text{color:#c9848a;font-size:0.7rem;letter-spacing:3px}
.divider-line.right{background:linear-gradient(90deg,#c9848a44,transparent)}
.form-group{margin-bottom:20px}
.form-label{display:block;color:#a89288;font-size:0.85rem;margin-bottom:8px}
.form-input{width:100%;background:rgba(255,255,255,0.06);border:1.5px solid rgba(201,132,138,0.3);border-radius:12px;padding:12px 16px;font-family:'Tajawal',sans-serif;color:#e8ddd6;font-size:0.95rem;outline:none;transition:all 0.2s;text-align:right}
.form-input:focus{border-color:#c9848a;box-shadow:0 0 0 4px rgba(201,132,138,0.15)}
.form-input::placeholder{color:rgba(255,255,255,0.25)}
.btn-login{width:100%;background:linear-gradient(135deg,#c9848a,#b5697a);color:white;border:none;border-radius:14px;padding:14px;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:1px;box-shadow:0 6px 20px rgba(201,132,138,0.4);transition:all 0.2s;margin-top:8px}
.btn-login:hover{opacity:0.9;transform:translateY(-2px)}
.error-msg{background:rgba(220,38,38,0.12);border:1px solid rgba(220,38,38,0.3);color:#fca5a5;padding:10px 16px;border-radius:10px;font-size:0.88rem;margin-bottom:16px;text-align:center}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-header">
    {% if s.logo_url %}
    <img src="{{ s.logo_url }}" class="login-logo" alt="logo">
    {% else %}
    <div class="login-logo-placeholder">🌸</div>
    {% endif %}
    <div class="login-store-name">{{ s.store_name|upper }}</div>
    <div class="login-subtitle">نظام الإدارة</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">دخول</div>
    <div class="divider-line right"></div>
  </div>

  {% if error %}
  <div class="error-msg">❌ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/admin/login">
    <div class="form-group">
      <label class="form-label">اسم المستخدم</label>
      <input type="text" name="username" class="form-input" placeholder="أدخل اسم المستخدم" required>
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input type="password" name="password" class="form-input" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-login">دخول ←</button>
  </form>
</div>
</body>
</html>
